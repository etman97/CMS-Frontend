<div class="auth-container">
  <div class="auth-card">
    <!-- Logo/Branding -->
    <div class="auth-header">
      <div class="auth-logo">
        <i class="pi pi-box"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your CMS dashboard</p>
    </div>

    <!-- Error Message -->
    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()" styleClass="w-full mb-3" />
    }

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          pInputText
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin&#64;cms.com"
          class="w-full"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
        />
      </div>

      <p-button
        type="submit"
        label="Sign In"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="loading()"
        severity="primary"
      />
    </form>

    <!-- Register Link -->
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Create one</a></p>
    </div>
  </div>

  <!-- Background decoration -->
  <div class="auth-bg">
    <div class="auth-bg-shape shape-1"></div>
    <div class="auth-bg-shape shape-2"></div>
    <div class="auth-bg-shape shape-3"></div>
  </div>
</div>

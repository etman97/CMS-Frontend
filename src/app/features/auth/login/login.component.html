<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card d-flex flex-column justify-content-center">

    <img src="Icon primary.svg" alt="WES Logo" class="logo-img" />

    <h2 class="login-title text-start">Login to WES Website admin</h2>

    <!-- Error Message -->
    @if (errorMessage()) {
      <div class="error-message">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <input
          type="email"
          class="form-control"
          placeholder="Email"
          aria-label="Email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="mb-3 password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control pe-5"
          placeholder="Password"
          aria-label="Password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="togglePassword()"
          aria-label="Toggle password visibility"
        >
          <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
        </button>
      </div>

      <div class="text-center mb-3">
        <button type="submit" class="btn login-btn" [disabled]="loading()">
          {{ loading() ? 'Logging in...' : 'Login' }}
        </button>
      </div>

      <div class="text-center">
        <a routerLink="/auth/forgot-password" class="forgot-link">Forgot Password ?</a>
      </div>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Create one</a></p>
    </div>
  </div>
</div>

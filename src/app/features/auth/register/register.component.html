<div class="register-page">
  <div class="register-wrapper">
    <!-- Left panel — branding -->
    <div class="brand-panel">
      <div class="brand-content">
        <img src="Icon primary.svg" alt="WES Logo" class="brand-logo" />
        <h1 class="brand-title">Join WES</h1>
        <p class="brand-subtitle">Create your admin account and start managing your website content.</p>
        <div class="brand-features">
          <div class="feature-item">
            <i class="bi bi-shield-check"></i>
            <span>Secure Access</span>
          </div>
          <div class="feature-item">
            <i class="bi bi-speedometer2"></i>
            <span>Fast Dashboard</span>
          </div>
          <div class="feature-item">
            <i class="bi bi-pencil-square"></i>
            <span>Easy Content Management</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel — form -->
    <div class="form-panel">
      <div class="form-card">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Fill in the details below to get started</p>

        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="error-message">{{ errorMessage() }}</div>
        }

        <form (ngSubmit)="onSubmit()">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                class="form-control"
                id="firstName"
                placeholder="John"
                [(ngModel)]="firstName"
                name="firstName"
              />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                class="form-control"
                id="lastName"
                placeholder="Doe"
                [(ngModel)]="lastName"
                name="lastName"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="john&#64;example.com"
              [(ngModel)]="email"
              name="email"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-control pe-5"
                id="password"
                placeholder="Min 6 characters"
                [(ngModel)]="password"
                name="password"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="togglePassword()"
                aria-label="Toggle password visibility"
              >
                <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                class="form-control pe-5"
                id="confirmPassword"
                placeholder="Repeat your password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="toggleConfirmPassword()"
                aria-label="Toggle confirm password visibility"
              >
                <i class="bi" [class.bi-eye]="!showConfirmPassword" [class.bi-eye-slash]="showConfirmPassword"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn login-btn" [disabled]="loading()">
            {{ loading() ? 'Creating Account...' : 'Create Account' }}
          </button>
        </form>

        <div class="form-footer">
          <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

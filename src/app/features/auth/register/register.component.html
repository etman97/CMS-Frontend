<div class="auth-container">
    <div class="auth-card">
        <!-- Logo/Branding -->
        <div class="auth-header">
            <div class="auth-logo">
                <i class="pi pi-box"></i>
            </div>
            <h1>Create Account</h1>
            <p>Set up your CMS admin account</p>
        </div>

        <!-- Error Message -->
        @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()" styleClass="w-full mb-3" />
        }

        <!-- Register Form -->
        <form (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input pInputText id="firstName" type="text" [(ngModel)]="firstName" name="firstName"
                        placeholder="John" class="w-full" />
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input pInputText id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Doe"
                        class="w-full" />
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input pInputText id="email" type="email" [(ngModel)]="email" name="email"
                    placeholder="john&#64;example.com" class="w-full" autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <p-password id="password" [(ngModel)]="password" name="password" placeholder="Min 6 characters"
                    [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" autocomplete="new-password" />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <p-password id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
                    placeholder="Repeat your password" [toggleMask]="true" [feedback]="false" styleClass="w-full"
                    inputStyleClass="w-full" autocomplete="new-password" />
            </div>

            <p-button type="submit" label="Create Account" icon="pi pi-user-plus" styleClass="w-full"
                [loading]="loading()" severity="primary" />
        </form>

        <!-- Login Link -->
        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
        </div>
    </div>

    <!-- Background decoration -->
    <div class="auth-bg">
        <div class="auth-bg-shape shape-1"></div>
        <div class="auth-bg-shape shape-2"></div>
        <div class="auth-bg-shape shape-3"></div>
    </div>
</div>

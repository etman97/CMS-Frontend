@if (isLoading) {
  <div class="page-loader"><div class="spinner"></div></div>
}

@if (!isLoading) {
  <main class="contact-page" [class.preview-mode]="isPreview">
    <section class="contact-section">
      <div class="contact-section__top-bg" aria-hidden="true">
        @if (heroImageUrl) {
          <img [src]="heroImageUrl" alt="" class="contact-section__top-image" />
        }
        <div class="contact-section__top-gradient"></div>
        <div class="contact-section__top-overlay"></div>
      </div>

      <div class="contact-section__glow contact-section__glow--left" aria-hidden="true"></div>
      <div class="contact-section__glow contact-section__glow--right" aria-hidden="true"></div>
      <div class="contact-section__glow contact-section__glow--bottom" aria-hidden="true"></div>

      <div class="contact-section__container">
        <header class="contact-hero">
          <h1>Contact Us</h1>
          @if (introDescription) {
            <p>{{ introDescription }}</p>
          }
        </header>

        <div class="contact-content">
          <div class="contact-content__left">
            <section class="info-block" aria-labelledby="contact-info-title">
              <h2 id="contact-info-title" class="section-title">Contact Us</h2>

              <div class="info-row info-row--split">
                @if (phone) {
                  <div class="info-item">
                    <span class="info-icon" aria-hidden="true">
                      <i class="bi bi-telephone"></i>
                    </span>
                    <a class="info-text" [href]="'tel:' + phone">{{ phone }}</a>
                  </div>
                }

                @if (email) {
                  <div class="info-item">
                    <span class="info-icon" aria-hidden="true">
                      <i class="bi bi-envelope"></i>
                    </span>
                    <a class="info-text" [href]="'mailto:' + email">{{ email }}</a>
                  </div>
                }
              </div>

              @if (address) {
                <div class="info-item info-item--full">
                  <span class="info-icon" aria-hidden="true">
                    <i class="bi bi-map"></i>
                  </span>
                  <span class="info-text">{{ address }}</span>
                </div>
              }
            </section>

            <section class="form-block" aria-labelledby="message-title">
              <h2 id="message-title" class="section-title">Message Us</h2>

              <form class="contact-form">
                <div class="contact-form__row">
                  <input type="text" class="form-field" placeholder="First Name" aria-label="First Name" />
                  <input type="text" class="form-field" placeholder="Last Name" aria-label="Last Name" />
                </div>

                <div class="contact-form__row">
                  <input type="tel" class="form-field" placeholder="Phone Number" aria-label="Phone Number" />
                  <input type="email" class="form-field" placeholder="Email" aria-label="Email" />
                </div>

                <div class="contact-form__textarea-wrap">
                  <textarea class="form-field form-field--textarea" placeholder="Enter your message" aria-label="Message"></textarea>
                </div>

                <button type="submit" class="submit-button">Submit</button>
              </form>
            </section>
          </div>

          <section class="visit-block" aria-labelledby="visit-title">
            <h2 id="visit-title" class="section-title">Visit Us</h2>
            @if (locationUrl) {
              <div class="visit-block__map">
                <iframe
                  [src]="locationUrl"
                  width="100%"
                  height="100%"
                  style="border:0"
                  allowfullscreen
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="Location map"
                ></iframe>
              </div>
            }
          </section>
        </div>
      </div>
    </section>
  </main>
}

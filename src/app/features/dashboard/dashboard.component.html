<div class="dashboard">
    <!-- Welcome Section -->
    <div class="welcome-section">
        <div class="welcome-content">
            <h1>Welcome back, {{ userName }}! 👋</h1>
            <p>Here's an overview of your CMS platform.</p>
        </div>
    </div>

    <!-- Stat Cards -->
    <div class="stats-grid">
        @for (card of statCards; track card.title) {
        <div class="stat-card">
            <div class="stat-icon" [style.background]="card.bgColor">
                <i [class]="card.icon" [style.color]="card.color"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value">{{ card.value }}</span>
                <span class="stat-label">{{ card.title }}</span>
            </div>
        </div>
        }
    </div>

    <!-- Content Grid -->
    <div class="content-grid">
        <!-- Recent Activity -->
        <div class="card activity-card">
            <div class="card-header">
                <h3>Recent Activity</h3>
                <span class="badge">Live</span>
            </div>
            <div class="activity-list">
                @for (item of recentActivity; track item.action) {
                <div class="activity-item">
                    <div class="activity-icon" [style.color]="item.color">
                        <i [class]="item.icon"></i>
                    </div>
                    <div class="activity-content">
                        <span class="activity-action">{{ item.action }}</span>
                        <span class="activity-time">{{ item.time }}</span>
                    </div>
                </div>
                }
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card quick-actions-card">
            <div class="card-header">
                <h3>Quick Actions</h3>
            </div>
            <div class="actions-grid">
                <button class="action-btn" disabled>
                    <i class="pi pi-plus-circle"></i>
                    <span>New Page</span>
                </button>
                <button class="action-btn" disabled>
                    <i class="pi pi-upload"></i>
                    <span>Upload Media</span>
                </button>
                <button class="action-btn" disabled>
                    <i class="pi pi-user-plus"></i>
                    <span>Add User</span>
                </button>
                <button class="action-btn" disabled>
                    <i class="pi pi-sitemap"></i>
                    <span>Edit Nav</span>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="edit-section-dialog" [dir]="dir">
    <div class="dialog-body">
        <textarea
            class="content-input"
            rows="6"
            [(ngModel)]="content"
            [placeholder]="placeholder"
        ></textarea>

        <div class="field">
            <span class="field-label">{{ lang === 'ar' ? 'رفع صورة' : 'Upload Image' }}</span>
            <div class="upload-area" (click)="fileInput.click()">
                <input #fileInput type="file" accept="image/png,image/jpeg,image/webp" hidden (change)="onFileChange($event)" />
                @if (isUploading) {
                    <span>{{ lang === 'ar' ? 'جارٍ الرفع...' : 'Uploading...' }}</span>
                } @else if (imageUrl) {
                    <img [src]="imageUrl" alt="Section image" class="upload-preview" />
                } @else {
                    <i class="bi bi-camera"></i>
                    <span>{{ uploadHint }}</span>
                }
            </div>
        </div>
    </div>

    <div class="dialog-footer">
        <button type="button" class="btn cancel-btn" (click)="cancel()">{{ lang === 'ar' ? 'إلغاء' : 'Cancel' }}</button>
        <button type="button" class="btn save-btn" (click)="save()" [disabled]="isUploading">{{ lang === 'ar' ? 'حفظ' : 'Save' }}</button>
    </div>
</div>

@if (isLoading) {
<div class="page-loader">
    <div class="spinner"></div>
</div>
}

<div class="dashboard-contact-us-page" [class.page-hidden]="isLoading">
    <app-dashboard-page-header
        title="Contact Us"
        [(active)]="isActive"
        [isSaving]="isSaving"
        [saveDisabled]="isSaving || isUploadingImage"
        (preview)="openPreview()"
        (save)="save()"
    />

    <p-tabs [(value)]="activeTab" class="contact-tabs">
        <p-tablist>
            <p-tab value="en">English version</p-tab>
            <p-tab value="ar">Arabic version</p-tab>
        </p-tablist>

        <p-tabpanels>
            <p-tabpanel value="en">
                <section class="editor-card">
                    <div
                        class="editor-top"
                        [style.background-image]="heroImageUrl ? 'url(' + heroImageUrl + ')' : null"
                        [class.editor-top--has-image]="heroImageUrl"
                    >
                        <div class="panel-tools">
                            <button type="button" class="icon-btn" aria-label="Upload image"
                                (click)="topImageInputEn.click()" [disabled]="isUploadingImage">
                                <i class="bi bi-upload"></i>
                            </button>
                            <input #topImageInputEn type="file" accept="image/png,image/jpeg,image/webp" hidden
                                (change)="onTopImageSelected($event)" />
                            <button type="button" class="icon-btn" aria-label="Add link">
                                <i class="bi bi-link-45deg"></i>
                            </button>
                        </div>

                        <article class="text-box">
                            <h2>{{ labels.en.introTitle }}</h2>
                            <textarea
                                class="content-input"
                                rows="3"
                                [(ngModel)]="introDescriptionEn"
                                placeholder="Enter content, for ex: At WES, we empower businesses to navigate the complexities of the digital age"
                            ></textarea>
                        </article>
                    </div>

                    <div class="editor-bottom">
                        <div class="contact-grid">
                            <article class="text-box text-box--card">
                                <h2>{{ labels.en.contactTitle }}</h2>
                                <div class="fields-grid">
                                    <input
                                        type="text"
                                        class="field-input"
                                        [(ngModel)]="phone"
                                        placeholder="Phone number"
                                    />
                                    <input
                                        type="email"
                                        class="field-input"
                                        [(ngModel)]="email"
                                        placeholder="Email"
                                    />
                                    <input
                                        type="text"
                                        class="field-input field-input--full"
                                        [(ngModel)]="address"
                                        placeholder="Address"
                                    />
                                </div>
                            </article>

                            <article class="text-box text-box--card">
                                <h2>{{ labels.en.visitTitle }}</h2>
                                <input
                                    type="url"
                                    class="field-input"
                                    [(ngModel)]="locationUrl"
                                    placeholder="Location URL"
                                />
                            </article>
                        </div>
                    </div>
                </section>
            </p-tabpanel>

            <p-tabpanel value="ar">
                <section class="editor-card" dir="rtl">
                    <div
                        class="editor-top"
                        [style.background-image]="heroImageUrl ? 'url(' + heroImageUrl + ')' : null"
                        [class.editor-top--has-image]="heroImageUrl"
                    >
                        <div class="panel-tools">
                            <button type="button" class="icon-btn" aria-label="Upload image"
                                (click)="topImageInputAr.click()" [disabled]="isUploadingImage">
                                <i class="bi bi-upload rtl-flip"></i>
                            </button>
                            <input #topImageInputAr type="file" accept="image/png,image/jpeg,image/webp" hidden
                                (change)="onTopImageSelected($event)" />
                            <button type="button" class="icon-btn" aria-label="Add link">
                                <i class="bi bi-link-45deg rtl-flip"></i>
                            </button>
                        </div>

                        <article class="text-box">
                            <h2>{{ labels.ar.introTitle }}</h2>
                            <textarea
                                class="content-input"
                                rows="3"
                                [(ngModel)]="introDescriptionAr"
                                placeholder="ادخل المحتوى، مثال: في WES نساعد الشركات على التعامل مع تحديات العصر الرقمي"
                            ></textarea>
                        </article>
                    </div>

                    <div class="editor-bottom">
                        <div class="contact-grid">
                            <article class="text-box text-box--card">
                                <h2>{{ labels.ar.contactTitle }}</h2>
                                <div class="fields-grid">
                                    <input
                                        type="text"
                                        class="field-input"
                                        [(ngModel)]="phone"
                                        placeholder="رقم الهاتف"
                                    />
                                    <input
                                        type="email"
                                        class="field-input"
                                        [(ngModel)]="email"
                                        placeholder="البريد الإلكتروني"
                                    />
                                    <input
                                        type="text"
                                        class="field-input field-input--full"
                                        [(ngModel)]="address"
                                        placeholder="العنوان"
                                    />
                                </div>
                            </article>

                            <article class="text-box text-box--card">
                                <h2>{{ labels.ar.visitTitle }}</h2>
                                <input
                                    type="url"
                                    class="field-input"
                                    [(ngModel)]="locationUrl"
                                    placeholder="رابط الموقع"
                                />
                            </article>
                        </div>
                    </div>
                </section>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</div>

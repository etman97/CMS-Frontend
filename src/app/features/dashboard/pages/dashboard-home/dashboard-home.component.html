@if (isLoading) {
<div class="page-loader">
    <div class="spinner"></div>
</div>
}

<div class="dashboard-home-page" [class.page-hidden]="isLoading">
    <app-dashboard-page-header
        title="Home"
        [(active)]="isActive"
        [isSaving]="isSaving"
        [saveDisabled]="isSaving || isUploadingImage"
        (preview)="onPreview()"
        (save)="save()"
    />

    <p-tabs [(value)]="activeTab" class="home-tabs">
        <p-tablist>
            <p-tab value="en">English version</p-tab>
            <p-tab value="ar">Arabic version</p-tab>
        </p-tablist>

        <p-tabpanels>
            <p-tabpanel value="en">
                <div class="editor-card" [style.background-image]="heroImageUrl ? 'url(' + heroImageUrl + ')' : null"
                    [class.editor-card--has-image]="heroImageUrl">
                    <div class="panel-tools">
                        <button type="button" class="icon-btn" aria-label="Upload image"
                            (click)="topImageInputEn.click()" [disabled]="isUploadingImage">
                            <i class="bi bi-upload"></i>
                        </button>
                        <input #topImageInputEn type="file" accept="image/png,image/jpeg,image/webp" hidden
                            (change)="onTopImageSelected($event)" />
                        <button type="button" class="icon-btn" aria-label="Add link">
                            <i class="bi bi-link-45deg"></i>
                        </button>
                    </div>


                    <div class="hero-fields">
                        <input type="text" class="form-control" [(ngModel)]="heroTitleEn"
                            placeholder="Enter hero section title, for ex: Welcome at WES" />

                        <textarea class="form-control" rows="2" [(ngModel)]="heroContentEn"
                            placeholder="Enter hero section content, for ex: At WES, we empower businesses to navigate the complexities of the digital age"></textarea>

                        <div class="buttons-row">
                            <div class="button-item">
                                <input type="text" class="form-control button-label-input"
                                    [(ngModel)]="primaryButtonTextEn" placeholder="Primary button" />
                                <button type="button" class="icon-btn" aria-label="Edit primary button text"
                                    (click)="openButtonDialog('primary', 'en')">
                                    <i class="bi bi-pen"></i>
                                </button>
                            </div>

                            <div class="button-item">
                                <input type="text" class="form-control button-label-input"
                                    [(ngModel)]="secondaryButtonTextEn" placeholder="Secondary button" />
                                <button type="button" class="icon-btn" aria-label="Edit secondary button text"
                                    (click)="openButtonDialog('secondary', 'en')">
                                    <i class="bi bi-pen"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </p-tabpanel>

            <p-tabpanel value="ar">
                <div class="editor-card" [style.background-image]="heroImageUrl ? 'url(' + heroImageUrl + ')' : null"
                    [class.editor-card--has-image]="heroImageUrl">
                    <div class="panel-tools">
                        <button type="button" class="icon-btn" aria-label="Upload image"
                            (click)="topImageInputAr.click()" [disabled]="isUploadingImage">
                            <i class="bi bi-upload rtl-flip"></i>
                        </button>
                        <input #topImageInputAr type="file" accept="image/png,image/jpeg,image/webp" hidden
                            (change)="onTopImageSelected($event)" />
                        <button type="button" class="icon-btn" aria-label="Add link">
                            <i class="bi bi-link-45deg rtl-flip"></i>
                        </button>
                    </div>


                    <div class="hero-fields" dir="rtl">
                        <input type="text" class="form-control" [(ngModel)]="heroTitleAr"
                            placeholder="ادخل عنوان قسم الهيرو، مثال: مرحباً بكم في WES" />

                        <textarea class="form-control" rows="2" [(ngModel)]="heroContentAr"
                            placeholder="ادخل محتوى قسم الهيرو، مثال: في WES نساعد الشركات على التعامل مع تحديات العصر الرقمي"></textarea>

                        <div class="buttons-row">
                            <div class="button-item">
                                <input type="text" class="form-control button-label-input"
                                    [(ngModel)]="primaryButtonTextAr" placeholder="الزر الأساسي" />
                                <button type="button" class="icon-btn" aria-label="Edit primary button text"
                                    (click)="openButtonDialog('primary', 'ar')">
                                    <i class="bi bi-pen rtl-flip"></i>
                                </button>
                            </div>

                            <div class="button-item">
                                <input type="text" class="form-control button-label-input"
                                    [(ngModel)]="secondaryButtonTextAr" placeholder="الزر الثانوي" />
                                <button type="button" class="icon-btn" aria-label="Edit secondary button text"
                                    (click)="openButtonDialog('secondary', 'ar')">
                                    <i class="bi bi-pen rtl-flip"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</div>

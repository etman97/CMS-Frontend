<div class="dashboard-partners-page">
    <app-dashboard-page-header
        title="Our Partners"
        [(active)]="isActive"
        [isSaving]="isSaving"
        [saveDisabled]="anyUploading"
        (preview)="onPreview()"
        (save)="save()"
    />

    <p-tabs [(value)]="activeTab" class="partners-tabs">
        <p-tablist>
            <p-tab value="en">English version</p-tab>
            <p-tab value="ar">Arabic version</p-tab>
        </p-tablist>

        <p-tabpanels>
            <p-tabpanel value="en">
                <section class="editor-card">
                    <div
                        class="editor-top"
                        [style.background-image]="topImageUrl ? 'url(' + topImageUrl + ')' : null"
                        [class.editor-top--has-image]="topImageUrl"
                    >
                        <div class="panel-tools">
                            <button type="button" class="icon-btn" aria-label="Upload image" (click)="topImageInputEn.click()">
                                <i class="bi bi-upload"></i>
                            </button>
                            <input #topImageInputEn type="file" accept="image/png,image/jpeg" hidden (change)="onTopImageSelected($event)" />
                            <button type="button" class="icon-btn" aria-label="Add link">
                                <i class="bi bi-link-45deg"></i>
                            </button>
                        </div>

                        <article class="text-box">
                            <h2>{{ introByLang.en.title }}</h2>
                            <textarea
                                class="content-input"
                                rows="3"
                                [(ngModel)]="introByLang.en.description"
                                placeholder="Enter content, for ex: At WES, we empower businesses to navigate the complexities of the digital age"
                            ></textarea>
                        </article>
                    </div>

                    <div class="editor-bottom">
                        <div class="partners-row">
                            @for (partner of partnerCards; track partner.localId) {
                                <article class="partner-card">
                                    <div class="partner-card__head">
                                        <button type="button" class="delete-btn" aria-label="Remove partner" (click)="removePartner(partner.localId)">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </div>
                                    <div class="partner-card__logo" (click)="partnerInputEn.click()">
                                        <input
                                            #partnerInputEn
                                            type="file"
                                            accept="image/png,image/jpeg,image/svg+xml"
                                            hidden
                                            (change)="onPartnerLogoSelected($event, partner.localId)"
                                        />
                                        @if (partner.imageUrl) {
                                            <img [src]="partner.imageUrl" alt="Partner logo" />
                                        }
                                    </div>
                                </article>
                            }

                            <button type="button" class="add-partner-card" (click)="addPartnerInputEn.click()">
                                <input
                                    #addPartnerInputEn
                                    type="file"
                                    accept="image/png,image/jpeg,image/svg+xml"
                                    hidden
                                    (change)="onAddPartnerSelected($event)"
                                />
                                <i class="bi bi-plus-lg"></i>
                                <span>Add partner</span>
                            </button>
                        </div>
                    </div>
                </section>
            </p-tabpanel>

            <p-tabpanel value="ar">
                <section class="editor-card" dir="rtl">
                    <div
                        class="editor-top"
                        [style.background-image]="topImageUrl ? 'url(' + topImageUrl + ')' : null"
                        [class.editor-top--has-image]="topImageUrl"
                    >
                        <div class="panel-tools">
                            <button type="button" class="icon-btn" aria-label="Upload image" (click)="topImageInputAr.click()">
                                <i class="bi bi-upload"></i>
                            </button>
                            <input #topImageInputAr type="file" accept="image/png,image/jpeg" hidden (change)="onTopImageSelected($event)" />
                            <button type="button" class="icon-btn" aria-label="Add link">
                                <i class="bi bi-link-45deg"></i>
                            </button>
                        </div>

                        <article class="text-box">
                            <h2>{{ introByLang.ar.title }}</h2>
                            <textarea
                                class="content-input"
                                rows="3"
                                [(ngModel)]="introByLang.ar.description"
                                placeholder="ادخل المحتوى، مثال: في WES نساعد الشركات على التعامل مع تحديات العصر الرقمي"
                            ></textarea>
                        </article>
                    </div>

                    <div class="editor-bottom">
                        <div class="partners-row">
                            <button type="button" class="add-partner-card" (click)="addPartnerInputAr.click()">
                                <input
                                    #addPartnerInputAr
                                    type="file"
                                    accept="image/png,image/jpeg,image/svg+xml"
                                    hidden
                                    (change)="onAddPartnerSelected($event)"
                                />
                                <i class="bi bi-plus-lg"></i>
                                <span>إضافة شريك</span>
                            </button>

                            @for (partner of partnerCards; track partner.localId) {
                                <article class="partner-card">
                                    <div class="partner-card__head">
                                        <button type="button" class="delete-btn" aria-label="Remove partner" (click)="removePartner(partner.localId)">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </div>
                                    <div class="partner-card__logo" (click)="partnerInputAr.click()">
                                        <input
                                            #partnerInputAr
                                            type="file"
                                            accept="image/png,image/jpeg,image/svg+xml"
                                            hidden
                                            (change)="onPartnerLogoSelected($event, partner.localId)"
                                        />
                                        @if (partner.imageUrl) {
                                            <img [src]="partner.imageUrl" alt="Partner logo" />
                                        }
                                    </div>
                                </article>
                            }
                        </div>
                    </div>
                </section>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</div>

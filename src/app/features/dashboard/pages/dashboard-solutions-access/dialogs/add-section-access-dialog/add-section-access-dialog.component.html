<div class="add-section-access-dialog" [dir]="dir">
    <div class="dialog-body">
        <div class="form-grid">
            <div class="form-col form-col--half">
                <label class="field">
                    <span class="field-label">{{ labels.titleEn }}</span>
                    <input type="text" class="field-input" [(ngModel)]="titleEn" [placeholder]="labels.titleEnPlaceholder" />
                </label>
            </div>

            <div class="form-col form-col--half">
                <label class="field">
                    <span class="field-label">{{ labels.titleAr }}</span>
                    <input type="text" class="field-input" [(ngModel)]="titleAr" [placeholder]="labels.titleArPlaceholder" />
                </label>
            </div>

            <div class="form-col form-col--half">
                <label class="field">
                    <span class="field-label">{{ labels.paragraphEn }}</span>
                    <textarea class="field-input field-input--textarea" rows="4" [(ngModel)]="paragraphEn" [placeholder]="labels.paragraphEnPlaceholder"></textarea>
                </label>
            </div>

            <div class="form-col form-col--half">
                <label class="field">
                    <span class="field-label">{{ labels.paragraphAr }}</span>
                    <textarea class="field-input field-input--textarea" rows="4" [(ngModel)]="paragraphAr" [placeholder]="labels.paragraphArPlaceholder"></textarea>
                </label>
            </div>

            <div class="form-col form-col--full">
                <fieldset class="field radio-fieldset">
                    <legend class="field-label">{{ labels.imageChoice }}</legend>
                    <div class="radio-options">
                        <label class="radio-option">
                            <input type="radio" name="imageMode" [checked]="imageMode === 'one'" [disabled]="requiredImageMode !== null" (change)="onImageModeChange('one')" />
                            <span>{{ labels.oneImage }}</span>
                        </label>

                        <label class="radio-option">
                            <input type="radio" name="imageMode" [checked]="imageMode === 'two'" [disabled]="requiredImageMode !== null" (change)="onImageModeChange('two')" />
                            <span>{{ labels.twoImages }}</span>
                        </label>
                    </div>
                    @if (requiredImageMode !== null) {
                        <small class="lock-note">{{ labels.imageModeLocked }}</small>
                    }
                </fieldset>
            </div>

            <div class="form-col" [class.form-col--half]="imageMode === 'two'" [class.form-col--full]="imageMode !== 'two'">
                <div class="field">
                    <span class="field-label">{{ labels.firstImage }}</span>
                    <div class="upload-area" (click)="firstImageInput.click()">
                        <input #firstImageInput type="file" accept="image/png,image/jpeg" hidden (change)="onFirstImageChange($event)" />
                        @if (firstImagePreview) {
                            <img [src]="firstImagePreview" alt="first image preview" class="upload-preview" />
                        } @else {
                            <i class="bi bi-camera"></i>
                            <span>{{ labels.uploadHint }}</span>
                        }
                    </div>
                </div>
            </div>

            @if (imageMode === 'two') {
                <div class="form-col form-col--half">
                    <div class="field">
                        <span class="field-label">{{ labels.secondImage }}</span>
                        <div class="upload-area" (click)="secondImageInput.click()">
                            <input #secondImageInput type="file" accept="image/png,image/jpeg" hidden (change)="onSecondImageChange($event)" />
                            @if (secondImagePreview) {
                                <img [src]="secondImagePreview" alt="second image preview" class="upload-preview" />
                            } @else {
                                <i class="bi bi-camera"></i>
                                <span>{{ labels.uploadHint }}</span>
                            }
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>

    <div class="dialog-footer">
        <button type="button" class="btn cancel-btn" (click)="cancel()">{{ labels.cancel }}</button>
        <button type="button" class="btn save-btn" (click)="save()">{{ labels.save }}</button>
    </div>
</div>

<main class="partners-page" [class.partners-page--preview]="isPreviewMode" [attr.dir]="isRtl ? 'rtl' : 'ltr'">
  <section class="hero">
    @if (heroImageUrl) {
      <div class="hero-bg-wrap">
        <img class="hero-bg" [src]="heroImageUrl" alt="" />
        <div class="hero-overlay"></div>
      </div>
    }

    <div class="hero-blur hero-blur-left"></div>
    <div class="hero-blur hero-blur-right"></div>
    <div class="hero-blur hero-blur-bottom"></div>

    <div class="container hero-content">
      <h1 class="page-title">{{ isRtl ? 'شركاؤنا' : 'Our Partners' }}</h1>
      <p class="page-subtitle">{{ subtitle }}</p>
    </div>
  </section>

  <section class="partners-section">
    <div class="container">
      <div class="partners-grid">
        @for (logo of partnerLogos; track logo.id) {
          <article class="partner-card">
            <img *ngIf="logo.logoImageUrl" [src]="logo.logoImageUrl" alt="Partner logo" />
          </article>
        }
      </div>
    </div>
  </section>
</main>

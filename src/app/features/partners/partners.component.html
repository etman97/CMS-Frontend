@if (isLoading) {
  <div class="page-loader"><div class="spinner"></div></div>
}

@if (!isLoading) {
  <main class="partners-page" [class.preview-mode]="isPreview">
    <section class="hero">
      @if (heroImageUrl) {
        <div class="hero-bg-wrap">
          <img class="hero-bg" [src]="heroImageUrl" alt="" />
          <div class="hero-overlay"></div>
        </div>
      }

      <div class="hero-blur hero-blur-left"></div>
      <div class="hero-blur hero-blur-right"></div>
      <div class="hero-blur hero-blur-bottom"></div>

      <div class="container hero-content">
        <h1 class="page-title">{{ introTitle }}</h1>
        @if (introDescription) {
          <p class="page-subtitle">{{ introDescription }}</p>
        }
      </div>
    </section>

    @if (partners.length > 0) {
      <section class="partners-section">
        <div class="container">
          <div class="partners-grid">
            @for (partner of partners; track partner.id) {
              <article class="partner-card">
                <img [src]="partner.imageUrl" alt="Partner" />
              </article>
            }
          </div>
        </div>
      </section>
    }
  </main>
}

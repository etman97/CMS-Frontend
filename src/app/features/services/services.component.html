<main class="services-page" [class.services-page--preview]="isPreviewMode" [attr.dir]="isRtl ? 'rtl' : 'ltr'">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-blur hero-blur-left"></div>
    <div class="hero-blur hero-blur-right"></div>
    <div class="hero-blur hero-blur-bottom"></div>

    <div class="hero-image-wrap">
      @if (heroImageUrl) {
        <img
          class="hero-image-backdrop"
          [src]="heroImageUrl"
          alt=""
          aria-hidden="true"
        />
        <img
          class="hero-image"
          [src]="heroImageUrl"
          alt=""
        />
      }
      <div class="hero-overlay"></div>
    </div>

    <div class="container hero-content">
      <h1 class="hero-label">{{ isRtl ? 'الخدمات' : 'Services' }}</h1>
      <p class="hero-text">{{ heroText }}</p>
    </div>
  </section>

  <!-- Services List -->
  <section class="services-list">
    <div class="container services-grid">
      @for (item of serviceItems; track item.id; let i = $index) {
        <article class="service-row" [class.service-row-text-first]="i % 2 === 0" [class.service-row-image-first]="i % 2 === 1">
          @if (i % 2 === 0) {
            <div class="service-copy">
              <h2>{{ item.title }}</h2>
              <p>{{ item.brief }}</p>
            </div>
            <div class="service-image">
              <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.title" />
            </div>
          } @else {
            <div class="service-image">
              <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.title" />
            </div>
            <div class="service-copy">
              <h2>{{ item.title }}</h2>
              <p>{{ item.brief }}</p>
            </div>
          }
        </article>
      }
    </div>
  </section>

</main>

<main class="solutions-page" [class.solutions-page--preview]="isPreviewMode" [attr.dir]="isRtl ? 'rtl' : 'ltr'">

  <!-- Hero -->
  <section class="hero">
    <div class="hero__bg hero__bg--left-glow"></div>
    <div class="hero__bg hero__bg--right-glow"></div>
    <div class="hero__bg hero__bg--bottom-glow"></div>

    <div class="hero__lamp-wrap" aria-hidden="true">
      @if (heroImageUrl) {
        <img class="hero__lamp" [src]="heroImageUrl" alt="" />
        <img class="hero__lamp hero__lamp--half" [src]="heroImageUrl" alt="" />
      }
      <div class="hero__lamp-overlay"></div>
    </div>

    <div class="layout-container hero__content">
      <h1 class="hero__title">{{ isRtl ? 'الحلول' : 'Solutions' }}</h1>
      <p class="hero__text">{{ heroText }}</p>
    </div>
  </section>

  <!-- Solutions Grid -->
  <section class="solutions-section">
    <div class="layout-container">
      <div class="section-title-wrap">
        <h2 class="section-title">{{ isRtl ? 'اكتشف حلولنا' : 'Discover Our Solutions' }}</h2>
      </div>
    </div>

    <div class="layout-container">
      <div class="row g-0">
        @for (card of solutionCards; track card.id) {
          <div class="col-md-6">
            <button type="button" class="solution-card" [disabled]="openingCardId !== null" (click)="openSolutionCard(card)">
              @if (card.imageUrl) {
                <img [src]="card.imageUrl" [alt]="card.title" />
              }
              <div class="solution-overlay"></div>
              <div class="solution-content">
                <h3>{{ card.title }} <span>→</span></h3>
                <p>{{ card.brief }}</p>
              </div>
            </button>
          </div>
        }
      </div>
    </div>
  </section>

</main>

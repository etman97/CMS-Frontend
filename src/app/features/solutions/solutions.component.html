@if (isLoading) {
  <div class="page-loader"><div class="spinner"></div></div>
}

@if (!isLoading) {
  <main class="solutions-page" [class.preview-mode]="isPreview">
    <section class="hero">
      <div class="hero__bg hero__bg--left-glow"></div>
      <div class="hero__bg hero__bg--right-glow"></div>
      <div class="hero__bg hero__bg--bottom-glow"></div>

      @if (heroImageUrl) {
        <div class="hero__lamp-wrap" aria-hidden="true">
          <img class="hero__lamp" [src]="heroImageUrl" alt="" />
          <div class="hero__lamp-overlay"></div>
        </div>
      }

      <div class="hero__content">
        <h1 class="hero__title">Solutions</h1>
        @if (introContent) {
          <p class="hero__text">{{ introContent }}</p>
        }
      </div>
    </section>

    @if (cards.length > 0) {
      <section class="solutions-section">
        <div class="container-fluid px-0">
          <div class="row g-0">
            @for (card of cards; track card.id) {
              <div class="col-md-6">
                <a href="/solutions" class="solution-card">
                  @if (card.imageUrl) {
                    <img [src]="card.imageUrl" [alt]="cardTitle(card)" />
                  }
                  <div class="solution-overlay"></div>
                  <div class="solution-content">
                    <h3>{{ cardTitle(card) }} <span>→</span></h3>
                    @if (cardContent(card)) {
                      <p>{{ cardContent(card) }}</p>
                    }
                  </div>
                </a>
              </div>
            }
          </div>
        </div>
      </section>
    }
  </main>
}

<main class="solution-detail">
  <div class="solution-detail__glow solution-detail__glow--left"></div>
  <div class="solution-detail__glow solution-detail__glow--right"></div>
  <div class="solution-detail__glow solution-detail__glow--bottom"></div>

  <div class="layout-container solution-detail__inner">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a class="breadcrumb__back" routerLink="/solutions" aria-label="Back to solutions">
        <span aria-hidden="true">&larr;</span>
      </a>
      <a class="breadcrumb__link" routerLink="/">Home</a>
      <span class="breadcrumb__separator" aria-hidden="true">/</span>
      <a class="breadcrumb__link" routerLink="/solutions">Solutions</a>
    </nav>

    <h1 class="solution-detail__title">Data Solutions</h1>

    <div class="solution-detail__sections">
      @for (section of sections; track section.title) {
        <article class="solution-block" [class.solution-block--reverse]="section.reverse">
          <div class="solution-block__copy">
            <h2>{{ section.title }}</h2>
            @for (paragraph of section.paragraphs; track paragraph) {
              <p>{{ paragraph }}</p>
            }
          </div>

          <div class="image-pair" aria-label="Supporting imagery for {{ section.title }}">
            @for (image of section.images; track image.src; let index = $index) {
              <figure class="image-pair__item" [class.image-pair__item--offset]="index === 1">
                <img [src]="image.src" [alt]="image.alt" loading="lazy" />
              </figure>
            }
          </div>
        </article>
      }
    </div>
  </div>
</main>

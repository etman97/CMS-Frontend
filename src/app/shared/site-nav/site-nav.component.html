<nav class="navbar navbar-expand-lg wes-navbar fixed-top">
  <div class="container">

    <a class="navbar-brand" routerLink="/" [attr.aria-label]="'nav.brandAria' | translate">
      <img
        src="/wes-logo-primary.png"
        alt="WES Logo"
        class="wes-logo"
      />
    </a>

    <button
      class="navbar-toggler border-0 shadow-none"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#wesNavbar"
      aria-controls="wesNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="wesNavbar">
      <ul class="navbar-nav wes-nav-list align-items-lg-center">
        @for (item of navItems; track item.key) {
          <li class="nav-item">
            @if (isPageEnabled(item.key)) {
              <a
                class="nav-link"
                [routerLink]="item.route"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              >
                {{ item.labelKey | translate }}
              </a>
            } @else {
              <span class="nav-link nav-link--disabled" aria-disabled="true">{{ item.labelKey | translate }}</span>
            }
          </li>
        }
        <li class="nav-item nav-item--language mt-3 mt-lg-0">
          <button type="button" class="btn btn-language" (click)="toggleLanguage()">
            <i class="bi bi-globe2 lang-icon"></i>
            {{ (isArabic ? 'nav.languageEnglish' : 'nav.languageArabic') | translate }}
          </button>
        </li>
      </ul>
    </div>

  </div>
</nav>
